name: 🤖 BlackRoad Shared Agent CI
on:
  push:
    branches: [main, dev, master]
  pull_request:
  workflow_dispatch:

jobs:
  agent-identity:
    name: Load Agent Identity
    runs-on: [self-hosted, pi]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Identify branch agent
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          # Resolve identity from local agent.json; no external AI providers required
          AGENT_JSON="$(cat agent.json 2>/dev/null || echo '{}')"
          OLLAMA_URL=$(echo "$AGENT_JSON" | python3 -c \
            "import json,sys; d=json.load(sys.stdin); print(d.get('ollama_url', d.get('gateway','http://octavia.local:11434')))")
          echo "{\"agent\":\"LUCIDIA\",\"branch\":\"${BRANCH}\",\"role\":\"orchestrator\",\"provider\":\"ollama\",\"ollama_url\":\"${OLLAMA_URL}\"}" \
            > .agent-identity.json
          AGENT=$(python3 -c "import json; print(json.load(open('.agent-identity.json')).get('agent','BLACKROAD'))")
          echo "🤖 Agent: ${AGENT} | Org: ${{ github.repository_owner }} | Branch: ${BRANCH} | Provider: ollama"
          echo "AGENT_NAME=${AGENT}" >> $GITHUB_ENV
          echo "OLLAMA_URL=${OLLAMA_URL}" >> $GITHUB_ENV
      - name: Health ping
        run: echo "✅ ${AGENT_NAME} active in ${{ github.repository }}"
