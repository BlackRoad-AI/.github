name: 🚀 Auto Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  detect-service:
    name: Detect Service Type
    runs-on: ubuntu-latest
    outputs:
      service_type: ${{ steps.detect.outputs.service_type }}
      deploy_target: ${{ steps.detect.outputs.deploy_target }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      
      - name: Detect Service Type
        id: detect
        run: |
          if [ -f "vercel.json" ]; then
            echo "service_type=vercel" >> $GITHUB_OUTPUT
            echo "deploy_target=vercel" >> $GITHUB_OUTPUT
          elif [ -f "next.config.mjs" ] || [ -f "next.config.js" ]; then
            echo "service_type=nextjs" >> $GITHUB_OUTPUT
            echo "deploy_target=cloudflare" >> $GITHUB_OUTPUT
          elif [ -f "Dockerfile" ]; then
            echo "service_type=docker" >> $GITHUB_OUTPUT
            echo "deploy_target=railway" >> $GITHUB_OUTPUT
          elif [ -f "package.json" ]; then
            echo "service_type=node" >> $GITHUB_OUTPUT
            echo "deploy_target=railway" >> $GITHUB_OUTPUT
          elif [ -f "requirements.txt" ]; then
            echo "service_type=python" >> $GITHUB_OUTPUT
            echo "deploy_target=railway" >> $GITHUB_OUTPUT
          else
            echo "service_type=static" >> $GITHUB_OUTPUT
            echo "deploy_target=cloudflare" >> $GITHUB_OUTPUT
          fi

  # ── Stripe: ensure products/prices exist before any deploy ──────────────
  stripe-sync:
    name: Sync Stripe Products
    needs: detect-service
    runs-on: ubuntu-latest
    if: secrets.STRIPE_SECRET_KEY != ''
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Sync products via Stripe CLI
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: |
          # Install Stripe CLI
          curl -sf https://packages.stripe.dev/api/security/keypair/stripe-cli-gpg/public \
            | gpg --dearmor | sudo tee /usr/share/keyrings/stripe.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/stripe.gpg] https://packages.stripe.dev/stripe-cli-debian-local stable main" \
            | sudo tee /etc/apt/sources.list.d/stripe.list
          sudo apt-get update -q && sudo apt-get install -y stripe

          # If a stripe-products.json fixture exists, apply it; otherwise just verify auth
          if [ -f "stripe-products.json" ]; then
            echo "📦 Applying Stripe product fixtures..."
            stripe fixtures stripe-products.json && echo "✅ Stripe products synced" \
              || { echo "❌ stripe fixtures failed — check stripe-products.json syntax and STRIPE_SECRET_KEY permissions"; exit 1; }
          else
            echo "ℹ️  No stripe-products.json found — skipping fixture sync"
            stripe products list --limit 5 > /dev/null && echo "✅ Stripe key valid" \
              || { echo "❌ Stripe API key validation failed — check STRIPE_SECRET_KEY secret"; exit 1; }
          fi

  # ── Vercel deployment ────────────────────────────────────────────────────
  deploy-vercel:
    name: Deploy to Vercel
    needs: [detect-service, stripe-sync]
    if: |
      always() &&
      needs.detect-service.outputs.deploy_target == 'vercel' &&
      (needs.stripe-sync.result == 'success' || needs.stripe-sync.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm i -g vercel
          # Production deploy on main/master; preview deploy on other branches
          if [ "${GITHUB_REF_NAME}" = "main" ] || [ "${GITHUB_REF_NAME}" = "master" ]; then
            vercel deploy --prod --token "$VERCEL_TOKEN" --yes
          else
            vercel deploy --token "$VERCEL_TOKEN" --yes
          fi

  # ── Cloudflare Pages deployment ──────────────────────────────────────────
  deploy-cloudflare:
    name: Deploy to Cloudflare Pages
    needs: [detect-service, stripe-sync]
    if: |
      always() &&
      needs.detect-service.outputs.deploy_target == 'cloudflare' &&
      (needs.stripe-sync.result == 'success' || needs.stripe-sync.result == 'skipped')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      
      - name: Setup Node
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .next --project-name=${{ github.event.repository.name }}

  # ── Railway deployment ───────────────────────────────────────────────────
  deploy-railway:
    name: Deploy to Railway
    needs: [detect-service, stripe-sync]
    if: |
      always() &&
      needs.detect-service.outputs.deploy_target == 'railway' &&
      (needs.stripe-sync.result == 'success' || needs.stripe-sync.result == 'skipped')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      
      - name: Install Railway CLI
        run: npm i -g @railway/cli
      
      - name: Deploy to Railway
        run: railway up --service ${{ github.event.repository.name }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ── Post-deploy health check ─────────────────────────────────────────────
  health-check:
    name: Health Check
    needs: [deploy-vercel, deploy-cloudflare, deploy-railway]
    if: always() && (needs.deploy-vercel.result == 'success' || needs.deploy-cloudflare.result == 'success' || needs.deploy-railway.result == 'success')
    runs-on: ubuntu-latest
    
    steps:
      - name: Wait for Deployment
        run: sleep 30
      
      - name: Check Health Endpoint
        run: |
          URL="${{ secrets.DEPLOY_URL }}/api/health"
          curl -f $URL || exit 1
      
      - name: Notify Success
        if: success()
        run: echo "✅ Deployment successful and healthy!"
      
      - name: Notify Failure
        if: failure()
        run: |
          echo "❌ Deployment health check failed!"
          exit 1

